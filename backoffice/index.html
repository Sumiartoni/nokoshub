<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NokosHUB Super Admin Panel — Restricted Access">
    <meta name="robots" content="noindex, nofollow">
    <title>NokosHUB — Super Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Animated mesh background -->
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                    <path d="M8 16L14 10L20 16L14 22L8 16Z" fill="white" opacity="0.9"/>
                    <path d="M14 10L20 16L26 10L20 4L14 10Z" fill="white" opacity="0.6"/>
                    <path d="M20 16L26 22L20 28L14 22L20 16Z" fill="white" opacity="0.3"/>
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">NokosHUB</span>
                <span class="brand-badge">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    Super Admin
                </span>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-card-glow"></div>
            <div class="login-card-inner">
                <div class="login-header">
                    <div class="login-header-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <h1>Selamat Datang</h1>
                    <p>Masukkan kredensial super admin untuk mengakses panel kontrol NokosHUB</p>
                </div>

                <form id="loginForm" class="login-form" autocomplete="off">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                            <input type="text" id="username" name="username"
                                placeholder="admin" value="admin" required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                            <input type="password" id="password" name="password"
                                placeholder="Masukkan password admin" required autocomplete="current-password">
                            <button type="button" class="toggle-eye" id="toggleEye" tabindex="-1">
                                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="error-box" id="errorBox" style="display:none">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span id="errorMsg">Login tidak valid</span>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">Masuk ke Dashboard</span>
                        <span class="btn-loader" id="btnLoader" style="display:none">
                            <span class="spinner"></span> Memverifikasi...
                        </span>
                        <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </form>

                <div class="login-footer">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    Panel ini hanya untuk Super Admin. Semua akses tidak sah akan dicatat dan dilaporkan.
                </div>
            </div>
        </div>

        <div class="login-meta">NokosHUB © 2026 &nbsp;·&nbsp; v2.0.0 &nbsp;·&nbsp; Restricted Access</div>
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 2 + Math.random() * 4;
            p.style.cssText = `
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                animation-delay:${Math.random()*12}s;
                animation-duration:${8+Math.random()*10}s;
                width:${size}px;
                height:${size}px;
                opacity:${0.15+Math.random()*0.35};
            `;
            container.appendChild(p);
        }

        // Toggle password visibility
        const toggleEye = document.getElementById('toggleEye');
        const adminKeyInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        toggleEye.addEventListener('click', () => {
            const isPass = adminKeyInput.type === 'password';
            adminKeyInput.type = isPass ? 'text' : 'password';
            eyeIcon.innerHTML = isPass
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
    </script>
    <script src="js/auth.js?v=20260509-1"></script>
</body>
</html>
