map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; connect-src 'self' https://accounts.google.com https://www.googleapis.com https://challenges.cloudflare.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://challenges.cloudflare.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; frame-src 'self' https://accounts.google.com https://challenges.cloudflare.com;" always;

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location = /login {
        return 302 /login/;
    }

    location = /register {
        return 302 /register/;
    }

    location = /register/verify {
        return 302 /register/verify/;
    }

    location = /blog {
        return 301 /;
    }

    location = /blog/ {
        return 301 /;
    }

    location = /nokos-whatsapp {
        return 301 /;
    }

    location = /nokos-whatsapp/ {
        return 301 /;
    }

    location = /nokos-telegram {
        return 301 /;
    }

    location = /nokos-telegram/ {
        return 301 /;
    }

    location = /otp-google {
        return 301 /;
    }

    location = /otp-google/ {
        return 301 /;
    }

    location = /otp-shopee {
        return 301 /;
    }

    location = /otp-shopee/ {
        return 301 /;
    }

    location = /kebijakan-privasi {
        return 302 /kebijakan-privasi/;
    }

    location = /syarat-ketentuan {
        return 302 /syarat-ketentuan/;
    }

    location = /refund {
        return 302 /refund/;
    }

    location = /nokos-tele {
        return 301 /;
    }

    location = /nokos-tele/ {
        return 301 /;
    }

    location = /otp-telegram {
        return 301 /;
    }

    location = /otp-telegram/ {
        return 301 /;
    }

    location = /nomor-virtual-shopee {
        return 301 /;
    }

    location = /nomor-virtual-shopee/ {
        return 301 /;
    }

    location = /user {
        return 302 /user/;
    }

    location /user/ {
        try_files $uri $uri/ /user/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
