x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-public-dns: &public-dns
  dns:
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
  dns_opt:
    - timeout:2
    - attempts:2
    - rotate

services:
  postgres:
    image: postgres:15-alpine
    container_name: nokos_postgres
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nokos
      POSTGRES_PASSWORD: nokos_password
      POSTGRES_DB: nokos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nokos -d nokos_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nokos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nokos_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --dns-result-order=ipv4first
      PORT: 3000
      API_BASE_URL: http://backend:3000
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      BACKEND_DASHBOARD_ENABLED: ${BACKEND_DASHBOARD_ENABLED:-false}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      DATABASE_URL: '${DATABASE_URL:?DATABASE_URL is required. Set your Supabase PostgreSQL URL in .env}'
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      TELEGRAM_SUPPORT_HANDLE: ${TELEGRAM_SUPPORT_HANDLE:-@nokoshubsupport}
      TELEGRAM_MAINTENANCE_NOTICE: ${TELEGRAM_MAINTENANCE_NOTICE:-Maintenance harian 23:00 WIB - 00:10 WIB. Hindari transaksi pada jam tersebut karena pesanan bisa tertunda atau gagal.}
      TELEGRAM_FORCE_IPV4: ${TELEGRAM_FORCE_IPV4:-true}
      TELEGRAM_POLLING_TIMEOUT_SECONDS: ${TELEGRAM_POLLING_TIMEOUT_SECONDS:-25}
      TELEGRAM_REQUEST_TIMEOUT_MS: ${TELEGRAM_REQUEST_TIMEOUT_MS:-35000}
      CS_TELEGRAM_BOT_TOKEN: ${CS_TELEGRAM_BOT_TOKEN:-}
      CS_TELEGRAM_BOT_USERNAME: ${CS_TELEGRAM_BOT_USERNAME:-}
      CS_TELEGRAM_ADMIN_IDS: ${CS_TELEGRAM_ADMIN_IDS:-}
      CS_TELEGRAM_POLLING_TIMEOUT_SECONDS: ${CS_TELEGRAM_POLLING_TIMEOUT_SECONDS:-25}
      CS_TELEGRAM_REQUEST_TIMEOUT_MS: ${CS_TELEGRAM_REQUEST_TIMEOUT_MS:-35000}
      CS_BOT_SYSTEM_PROMPT: ${CS_BOT_SYSTEM_PROMPT:-}
      CS_BOT_MAX_HISTORY: ${CS_BOT_MAX_HISTORY:-12}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-20b:free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-NokosHUB CS Bot}
      HERO_SMS_API_KEY: ${HERO_SMS_API_KEY}
      HERO_SMS_BASE_URL: ${HERO_SMS_BASE_URL:-https://hero-sms.com/stubs/handler_api.php}
      SMSBOWER_API_KEY: ${SMSBOWER_API_KEY:-}
      SMSBOWER_BASE_URL: ${SMSBOWER_BASE_URL:-https://smsbower.page/stubs/handler_api.php}
      HERO_SMS_PRICE_TO_IDR_RATE: ${HERO_SMS_PRICE_TO_IDR_RATE:-17000}
      USD_IDR_RATE_AUTO_ENABLED: ${USD_IDR_RATE_AUTO_ENABLED:-true}
      USD_IDR_RATE_API_URL: ${USD_IDR_RATE_API_URL:-https://api.frankfurter.dev/v2/rate/USD/IDR}
      USD_IDR_RATE_BUFFER_PERCENT: ${USD_IDR_RATE_BUFFER_PERCENT:-0}
      USD_IDR_RATE_REFRESH_MINUTES: ${USD_IDR_RATE_REFRESH_MINUTES:-360}
      QRIS_STATIC_STRING: ${QRIS_STATIC_STRING}
      QRIS_DYNAMIC_ENABLED: ${QRIS_DYNAMIC_ENABLED:-true}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      BAYAR_GG_API_KEY: ${BAYAR_GG_API_KEY:-}
      BAYAR_GG_WEBHOOK_SECRET: ${BAYAR_GG_WEBHOOK_SECRET:-}
      BAYAR_GG_PAYMENT_METHOD: ${BAYAR_GG_PAYMENT_METHOD:-qris}
      BAYAR_GG_REDIRECT_URL: ${BAYAR_GG_REDIRECT_URL:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      BACKOFFICE_USERNAME: ${BACKOFFICE_USERNAME:-admin}
      BACKOFFICE_PASSWORD_HASH: ${BACKOFFICE_PASSWORD_HASH:-}
      BACKOFFICE_SESSION_SECRET: ${BACKOFFICE_SESSION_SECRET:-}
      BACKOFFICE_SESSION_HOURS: ${BACKOFFICE_SESSION_HOURS:-8}
      BACKOFFICE_COOKIE_SECURE: ${BACKOFFICE_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-NokosHUB}
      EMAIL_FROM_EMAIL: ${EMAIL_FROM_EMAIL:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      SELL_PRICE_MULTIPLIER: ${SELL_PRICE_MULTIPLIER:-3.5}
      PROVIDER_SYNC_ON_STARTUP: ${PROVIDER_SYNC_ON_STARTUP:-true}
      PROVIDER_SYNC_INTERVAL_MINUTES: ${PROVIDER_SYNC_INTERVAL_MINUTES:-360}
      PROVIDER_SYNC_STARTUP_DELAY_MS: ${PROVIDER_SYNC_STARTUP_DELAY_MS:-30000}
      OTP_POLL_INTERVAL_MS: ${OTP_POLL_INTERVAL_MS:-5000}
      OTP_POLL_MAX_MS: ${OTP_POLL_MAX_MS:-1200000}
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    volumes:
      - ./backend/prisma:/app/prisma
    logging: *default-logging
    <<: *public-dns
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nokos_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --dns-result-order=ipv4first
      API_BASE_URL: http://backend:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      DATABASE_URL: '${DATABASE_URL:?DATABASE_URL is required. Set your Supabase PostgreSQL URL in .env}'
      REDIS_URL: redis://redis:6379
      HERO_SMS_API_KEY: ${HERO_SMS_API_KEY}
      HERO_SMS_BASE_URL: ${HERO_SMS_BASE_URL:-https://hero-sms.com/stubs/handler_api.php}
      SMSBOWER_API_KEY: ${SMSBOWER_API_KEY:-}
      SMSBOWER_BASE_URL: ${SMSBOWER_BASE_URL:-https://smsbower.page/stubs/handler_api.php}
      HERO_SMS_PRICE_TO_IDR_RATE: ${HERO_SMS_PRICE_TO_IDR_RATE:-17000}
      USD_IDR_RATE_AUTO_ENABLED: ${USD_IDR_RATE_AUTO_ENABLED:-true}
      USD_IDR_RATE_API_URL: ${USD_IDR_RATE_API_URL:-https://api.frankfurter.dev/v2/rate/USD/IDR}
      USD_IDR_RATE_BUFFER_PERCENT: ${USD_IDR_RATE_BUFFER_PERCENT:-0}
      USD_IDR_RATE_REFRESH_MINUTES: ${USD_IDR_RATE_REFRESH_MINUTES:-360}
      OTP_POLL_INTERVAL_MS: ${OTP_POLL_INTERVAL_MS:-5000}
      OTP_POLL_MAX_MS: ${OTP_POLL_MAX_MS:-1200000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      QRIS_STATIC_STRING: ${QRIS_STATIC_STRING}
      QRIS_DYNAMIC_ENABLED: ${QRIS_DYNAMIC_ENABLED:-true}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      BACKOFFICE_USERNAME: ${BACKOFFICE_USERNAME:-admin}
      BACKOFFICE_PASSWORD_HASH: ${BACKOFFICE_PASSWORD_HASH:-}
      BACKOFFICE_SESSION_SECRET: ${BACKOFFICE_SESSION_SECRET:-}
      BACKOFFICE_SESSION_HOURS: ${BACKOFFICE_SESSION_HOURS:-8}
      BACKOFFICE_COOKIE_SECURE: ${BACKOFFICE_COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      JWT_SECRET: ${JWT_SECRET}
    command: ['node', 'dist/src/worker.js']
    logging: *default-logging
    <<: *public-dns

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nokos_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-8081}:80'
    tmpfs:
      - /var/cache/nginx
      - /var/run
    logging: *default-logging
    <<: *public-dns
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/user/ >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: nokos_backoffice
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '127.0.0.1:${BACKOFFICE_PORT:-8080}:80'
    tmpfs:
      - /var/cache/nginx
      - /var/run
    logging: *default-logging
    <<: *public-dns
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/dashboard.html >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
